<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header{
            text-align: center;
            color: white;
            background-color: black;
            padding: 20px;
        }
        body{
            padding-bottom: 25px;  
        }
        .footer{
            font-size: 12px;
            padding: 5px 0;
            text-align: center;
            color: white;
            background-color: black;
            padding: 20px;
        }
        .form_info{
            width: 300px;
            margin: 30px auto;
            padding: 30px;
            background-color: rgb(241, 243, 246);
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.5);
            
        }
        input, select{
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }
        label{
            margin: 0;
        }
        .button_{
            color: white;
            background-color: green;
        }
        .button_{
            width: 100%;
            padding: 8px;
            color: white;
            background-color: green;
            border: none;
        }
        .fixed{
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: blue;
            color: white;
            text-align: center;
            padding: 5px 0;
            font-size: 12px;
            /* z-index: 1000; */
        }
    </style>
</head>
<body>
    <header class="header"><h4 style="margin: 0;">TechFlow Solution</h4></header>

    <form action="" class="form_info">
        <h4 style="text-align: center; margin-bottom: 10px;">Create Account</h4>
        <label for="email"><h4>Email Address</h4></label>
        <input type="email" id="email" placeholder="Email Address">
        <label for="password"><h4>Password</h4></label>
        <input type="password" id="password">
        <label for="confirm_password"><h4>Confirm Password</h4></label>
        <input type="password" id="confirm_password">
        <label for="gender"><h4>Gender</h4></label>
        <select name="" id="gender">
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
        <button class="button_">Register</button>


    </form>
    <footer class="footer">&copy; 2026 TechFlow Solution. All rights reserved</footer>
    <div class="fixed">Current User: 1</div>
</body>
</html>
