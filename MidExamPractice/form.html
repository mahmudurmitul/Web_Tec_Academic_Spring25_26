<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br>
        <p>Choice your favourite language:</p>
        <input type="radio" id="html" name="favourite_language" value="HTML">
        <label for="html" >HTML</label><br>
        <input type="radio" id="css" name="favourite_language" value="CSS">
        <label for="css">CSS</label>
        <p>Choice Your favourite game:</p>
        <input type="checkbox" id="football" name="football1" value="Football">
        <label for="Football">Football</label><br>
        <label for="cars">Choice Car:</label>
        <select name="cars" id="cars">
            <option value="Volvo">Volvo</option>
            <option value="Hino">Hino</option>
            <option value="Man">Man</option>
        </select><br>
        <input type="submit">
    </form>
</body>
</html>
