<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro</title>
</head>
<body>
    <h2>What can JavaScript Do?</h2>
    <p id="demo">JavaScript can change HTML content</p>

    <button type="button" onclick='document.getElementById("demo").innerHTML="Hello JavaScript!" '>Click Me!</button>

    <button type="button" onclick='document.getElementById("demo").style.fontSize="35px" '>Click Me!</button>

    <button type="button" onclick="document.getElementById('demo').style.display='none'">Clear</button>

    <p id="Demo" style="display:none;">Hello JavaScript!</p>

    <button type="button" onclick="document.getElementById('Demo').style.display='block'">Show Me!</button>

    <!-- Where to -->
     <h2>JavaScript in Body</h2>
     <h1 id="w"></h1>
     <script>
        document.getElementById("w").innerHTML="My First Javascript";
     </script>

    
</body>
</html>
