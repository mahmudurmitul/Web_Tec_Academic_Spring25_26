<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Case</title>
</head>
<body>
    <p id="date"></p>
    <script>
        let day;
        let date=new Date().getDate();

        switch(date){
            case 0: 
                day="Sunday";
                break;
            case 1: 
                day="monday";
                break;
            case 5: 
                day="Friday"
                break;
            default :
                day="false"
            
        }
        document.getElementById("date").innerHTML="Today is "+day+date;
    </script>
</body>
</html>
